# Jekyll configuration
url: https://bagusaji.com
title: Bagus Aji Santoso
description: Frontend Engineer building React & Next.js apps and interactive 3D product configurators with Three.js. Based in Indonesia, open to relocation.
author:
  name: Bagus Aji Santoso
  email: bagus@bagusaji.com
  twitter: bgusji
  github: lobothijau
  linkedin: baguzzzaji
exclude:
  - README.md
  - package-lock.json
  - postcss.config.js
  - tailwind.config.js
  - yarn.lock

# Page configuration
permalink: /:title/
collections:
  pages:
    output: true
    permalink: /:path/
  hotwire:
    output: true
    permalink: /hotwire/edition-:title/
  portfolios:
    output: true
    permalink: /portfolios/:title/
  books:
    output: true
    permalink: /books/:path/
defaults:
  - scope:
      path: ""
      type: books
    values:
      layout: book
      back: /books
  - scope:
      path: _posts/
      type: posts
    values:
      layout: post
      back: /articles
      preview_links_template_id: 999
  - scope:
      path: _posts/turbo-ios
      type: posts
    values:
      permalink: /turbo-ios/:title/
      back: _posts/2021-05-14-turbo-ios.md
  - scope:
      path: _hotwire/
      type: hotwire
    values:
      layout: hotwire
      back: _pages/newsletter.liquid
      preview_links_template_id: 1000
      og_title: ⚡️ Hotwire Monthly newsletter

# Plugin configuration
plugins:
  - jekyll-postcss
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-inline-svg
postcss:
  cache: false

# Custom configuration
fathom: ABCD1234
preview_links:
  site_id: 755
